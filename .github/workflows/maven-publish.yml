name: Maven Package
on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Critical: Allows pushing the .jar to GitHub Packages

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Set up JDK 21
        uses: actions/setup-java@3a4f611ca74359a53f093051d97f394469d80d2d
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github # Matches the <id> in your pom.xml distributionManagement
          settings-path: ${{ github.workspace }}

      - name: Publish to GitHub Packages
        run: mvn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }} # Included in case tests run during deploy
